<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thayner - Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="sobre.html">Sobre mim</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html" class="ativo">Contato</a></li>
            </ul>
            <button id="btnTema" style="margin-left: 20px; padding: 8px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold;">🌙 Escuro</button>
        </nav>
    </header>

    <main>
        <section>
            <h1>Entre em Contato</h1>
            <p>Preencha o formulário abaixo para me enviar uma mensagem.</p>

            <form id="formContato">
                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome completo">
                </div>

                <div class="campo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="usuario@dominio.com">
                </div>

                <div class="campo">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..."></textarea>
                </div>

                <button type="submit" id="btnEnviar">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <script>
        // Seleciona o formulário pelo ID
        const form = document.getElementById('formContato');

        // Adiciona um "ouvinte" para o evento de envio (submit) do formulário
        form.addEventListener('submit', function(event) {
            // Impede a página de recarregar automaticamente ao clicar no botão
            event.preventDefault();

            // Captura os valores digitados nos campos, removendo espaços em branco nas pontas
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const mensagem = document.getElementById('mensagem').value.trim();

            // Expressão regular simples para validar o formato do e-mail
            const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // 1. Validação de campos vazios
            if (nome === '' || email === '' || mensagem === '') {
                alert('Por favor, preencha todos os campos antes de enviar.');
                return; // Para a execução do script aqui
            }

            // 2. Validação do formato do e-mail
            if (!regexEmail.test(email)) {
                alert('Por favor, insira um e-mail válido (exemplo: usuario@dominio.com).');
                return;
            }

            // 3. Simulação de envio com sucesso
            alert('Mensagem enviada com sucesso!');
            
            // Limpa os campos do formulário após o sucesso
            form.reset();
        });
    </script>

</body>
</html>
